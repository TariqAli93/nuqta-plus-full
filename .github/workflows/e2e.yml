name: E2E (Playwright)

# Browser end-to-end suite for the Nuqta Plus frontend.
# Spins up Postgres, migrates + seeds the demo data (admin / Admin@123),
# starts the Fastify backend on :41732, then runs Playwright (which starts the
# Vite web dev server on :5173 itself and reuses the running backend).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: nuqta_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match these to the variable names the backend reads in backend/.env.
      NODE_ENV: development
      PORT: '41732'
      DATABASE_URL: postgres://postgres:root@localhost:5432/nuqta_db
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: root
      PGDATABASE: nuqta_db
      # E2E overrides (defaults already match, listed for clarity)
      NUQTA_BASE_URL: http://localhost:5173
      NUQTA_API_URL: http://127.0.0.1:41732/api
      NUQTA_ADMIN_USER: admin
      NUQTA_ADMIN_PASS: Admin@123

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Backend: install, migrate, seed demo data ──────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: pnpm install --no-frozen-lockfile

      - name: Migrate database
        working-directory: backend
        run: pnpm run db:migrate

      - name: Seed demo data (admin / Admin@123)
        working-directory: backend
        run: pnpm run seed:demo

      - name: Start backend
        working-directory: backend
        run: pnpm start &

      - name: Wait for backend health
        run: npx --yes wait-on -t 120000 http://127.0.0.1:41732/health

      # ── Frontend: install + browsers + run ─────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        working-directory: frontend
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/.artifacts/html-report
          retention-days: 14
